<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Editable HTML</title>
    <style>
        html { background-color: #fffad6; }
        div { font-family: "Courier New", monospace; }
        .keyword { color: blue }
    </style>
  </head>
  <body>
    <div contenteditable="true" autofocus>
        <div>Hello!</div>
        <div>How are <span class="keyword">you</span> doing?</div>
    </div>
  </body>
</html>
