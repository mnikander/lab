<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Editable HTML</title>
    <style>
        html { background-color: #fffad6; }
        #surface { display: grid; }
        #viewer, #editor {
          grid-area: 1 / 1;
          box-sizing: border-box;
          width: 100%;
          min-height: 12rem;
          border: 0;
          margin: 0;
          padding: 0;
          font-size: medium;
          font-family: "Courier New", monospace;
          line-height: 1.4;
          white-space: pre-wrap;
        }
        #viewer { pointer-events: none; z-index: 1; }
        #editor {
          z-index: 0;
          overflow: hidden;
          resize: none;
          color: transparent;
          caret-color: black;
          background: transparent;
        }
        .keyword { color: blue }
    </style>
  </head>
  <body>
    <div id="surface">
      <textarea id="editor" autofocus>
function main() int {
  let x = 1
  let y = if (x >= 0) { x } else { -x }
  y
}
</textarea>
      <div id="viewer"></div>
    </div>
    <script>
      const viewer = document.querySelector("#viewer");
      const editor = document.querySelector("#editor");
      const keywords = /\b(function|let|if|else)\b/g;

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function highlightKeywords(text) {
        return escapeHtml(text).replace(
          keywords,
          '<span class="keyword">$1</span>',
        );
      }

      function updateViewer() {
        viewer.innerHTML = highlightKeywords(editor.value);
      }

      function resizeEditor() {
        editor.style.height = "auto";
        editor.style.height = `${editor.scrollHeight}px`;
      }

      editor.addEventListener("input", () => {
        updateViewer();
        resizeEditor();
      });
      updateViewer();
      resizeEditor();
    </script>
  </body>
</html>
